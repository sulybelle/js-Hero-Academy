<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — JS Heroes Academy</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="header-root"></div>
  <main class="form-page">
    <div class="form-container">
      <h2>WELCOME <span>BACK</span></h2>
      <p class="form-subtitle"><span class="lang-en">Log in to your account</span><span class="lang-kz">Аккаунтыңызға кіріңіз</span></p>
      <div class="alert alert-error" id="alertError"></div>
      <div class="alert alert-success" id="alertSuccess"></div>
      <form id="loginForm">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="loginEmail" placeholder="email@example.com" required>
        </div>
        <div class="form-group">
          <label><span class="lang-en">Password</span><span class="lang-kz">Пароль</span></label>
          <input type="password" id="loginPassword" placeholder="••••••" required>
        </div>
        <button type="submit" class="btn btn-primary form-btn"><span class="lang-en">Login</span><span class="lang-kz">Кіру</span> →</button>
      </form>
      <p class="form-link"><span class="lang-en">Don't have an account?</span><span class="lang-kz">Аккаунтыңыз жоқ па?</span> <a href="/register"><span class="lang-en">Register</span><span class="lang-kz">Тіркелу</span></a></p>
    </div>
  </main>
  <div id="footer-root"></div>
  <script src="/js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('header-root').innerHTML = getHeader('');
      document.getElementById('footer-root').innerHTML = getFooter();
      initPage();
    });
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      hide('alertError'); hide('alertSuccess');
      const body = { email: document.getElementById('loginEmail').value.trim(), password: document.getElementById('loginPassword').value };
      const res = await fetch('/api/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
      const data = await res.json();
      if (!res.ok) { show('alertError', data.error); return; }
      localStorage.setItem('jsha_user', JSON.stringify(data.user));
      show('alertSuccess', currentLang==='kz'?'Сәтті кірдіңіз!':'Logged in!');
      setTimeout(() => window.location.href = '/courses', 1000);
    });
    function show(id, msg) { const el=document.getElementById(id); el.textContent=msg; el.style.display='block'; }
    function hide(id) { document.getElementById(id).style.display='none'; }
  </script>
</body>
</html>
