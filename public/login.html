<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — JS Heroes Academy</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .form-group input.input-error   { border-color: var(--danger)  !important; }
    .form-group input.input-success { border-color: var(--success) !important; }
    .field-error { display:block; font-size:11px; color:var(--danger);  margin-top:4px; min-height:16px; }
    .pass-wrap { position:relative; }
    .pass-wrap input { padding-right:44px !important; }
    .pass-toggle {
      position:absolute; right:12px; top:50%; transform:translateY(-50%);
      background:none; border:none; cursor:pointer; font-size:16px;
      color:var(--text-muted); padding:0; line-height:1;
    }
    .pass-toggle:hover { color:var(--accent); }
  </style>
</head>
<body>
<div id="header-root"></div>

<main class="form-page">
  <div class="form-container">
    <h2>WELCOME <span>BACK</span></h2>
    <p class="form-subtitle">
      <span class="lang-en">Log in to your account</span>
      <span class="lang-kz">Аккаунтыңызға кіріңіз</span>
    </p>

    <div class="alert alert-error"   id="alertError"></div>
    <div class="alert alert-success" id="alertSuccess"></div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="loginEmail" placeholder="email@example.com">
      <span class="field-error" id="emailErr"></span>
    </div>

    <div class="form-group">
      <label><span class="lang-en">Password</span><span class="lang-kz">Пароль</span></label>
      <div class="pass-wrap">
        <input type="password" id="loginPassword" placeholder="••••••">
        <button type="button" class="pass-toggle" onclick="togglePass('loginPassword', this)" title="Show/Hide">👁</button>
      </div>
      <span class="field-error" id="passErr"></span>
    </div>

    <button class="btn btn-primary form-btn" onclick="submitLogin()">
      <span class="lang-en">Login</span><span class="lang-kz">Кіру</span> →
    </button>

    <p class="form-link">
      <span class="lang-en">Don't have an account?</span>
      <span class="lang-kz">Аккаунтыңыз жоқ па?</span>
      <a href="/register"><span class="lang-en">Register</span><span class="lang-kz">Тіркелу</span></a>
    </p>
  </div>
</main>

<div id="footer-root"></div>
<script src="/js/main.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('header-root').innerHTML = getHeader('');
    document.getElementById('footer-root').innerHTML = getFooter();
    initPage();

    const saved = JSON.parse(localStorage.getItem('jsha_last_email') || 'null');
    if (saved) document.getElementById('loginEmail').value = saved;

    document.getElementById('loginEmail').addEventListener('input',    validateEmail);
    document.getElementById('loginPassword').addEventListener('input', validatePass);
    document.getElementById('loginPassword').addEventListener('keydown', e => {
      if (e.key === 'Enter') submitLogin();
    });
  });

  function togglePass(inputId, btn) {
    const input = document.getElementById(inputId);
    if (input.type === 'password') { input.type = 'text';     btn.textContent = '🙈'; }
    else                           { input.type = 'password'; btn.textContent = '👁'; }
  }

  function setFieldState(inputId, errId, isValid, msg) {
    const input = document.getElementById(inputId);
    const err   = document.getElementById(errId);
    input.classList.toggle('input-error',  !isValid);
    input.classList.toggle('input-success', isValid);
    err.textContent = isValid ? '' : msg;
    return isValid;
  }

  function validateEmail() {
    const v  = document.getElementById('loginEmail').value.trim();
    const kz = currentLang === 'kz';
    const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!v)          return setFieldState('loginEmail','emailErr', false, kz?'Email енгізіңіз':'Enter your email');
    if (!re.test(v)) return setFieldState('loginEmail','emailErr', false, kz?'Email форматы дұрыс емес':'Invalid email');
    return setFieldState('loginEmail','emailErr', true, '');
  }

  function validatePass() {
    const v  = document.getElementById('loginPassword').value;
    const kz = currentLang === 'kz';
    if (!v)           return setFieldState('loginPassword','passErr', false, kz?'Пароль енгізіңіз':'Enter password');
    if (v.length < 6) return setFieldState('loginPassword','passErr', false, kz?'Кемінде 6 таңба':'Min 6 characters');
    return setFieldState('loginPassword','passErr', true, '');
  }

  async function submitLogin() {
    hide('alertError'); hide('alertSuccess');
    if (!validateEmail() | !validatePass()) return;

    showSpinner();
    const email    = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
 
    const lsResult = loginFromLS(email, password);
    if (lsResult.success) {
      hideSpinner();
       localStorage.setItem('jsha_user', JSON.stringify(lsResult.user));
      localStorage.setItem('jsha_last_email', JSON.stringify(email));
      show('alertSuccess', currentLang === 'kz' ? '✅ Сәтті кірдіңіз!' : '✅ Logged in!');
      showToast(currentLang === 'kz' ? 'Сәтті кірдіңіз!' : 'Welcome back!', 'success');
      setTimeout(() => window.location.href = '/courses', 1000);
      return;
    }
 
    try {
      const res  = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      hideSpinner();

      if (!res.ok) {
        show('alertError', data.error);
        showToast(data.error, 'error');
        return;
      }
 
      localStorage.setItem('jsha_user', JSON.stringify(data.user));
      localStorage.setItem('jsha_last_email', JSON.stringify(email));

      show('alertSuccess', currentLang === 'kz' ? '✅ Сәтті кірдіңіз!' : '✅ Logged in!');
      showToast(currentLang === 'kz' ? 'Сәтті кірдіңіз!' : 'Welcome back!', 'success');
      setTimeout(() => window.location.href = '/courses', 1000);

    } catch {
      hideSpinner(); 
      show('alertError', lsResult.error || 'Network error');
      showToast(lsResult.error || 'Network error', 'error');
    }
  }

  function show(id, msg) {
    const el = document.getElementById(id);
    el.textContent  = msg;
    el.style.display = 'block';
  }
  function hide(id) {
    document.getElementById(id).style.display = 'none';
  }
</script>
</body>
</html>
