<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — JS Heroes Academy</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="header-root"></div>
  <main class="form-page">
    <div class="form-container">
      <h2>CREATE <span>ACCOUNT</span></h2>
      <p class="form-subtitle"><span class="lang-en">Join the academy and start learning</span><span class="lang-kz">Академияға тіркеліп, оқуды бастаңыз</span></p>
      <div class="alert alert-error" id="alertError"></div>
      <div class="alert alert-success" id="alertSuccess"></div>
      <form id="registerForm">
        <div class="form-group">
          <label><span class="lang-en">Full Name</span><span class="lang-kz">Аты-жөні</span></label>
          <input type="text" id="regName" placeholder="Айбек Серікұлы" required>
        </div>
        <div class="form-group">
          <label><span class="lang-en">Phone</span><span class="lang-kz">Телефон</span></label>
          <input type="tel" id="regPhone" placeholder="+7 700 000 00 00" required>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="regEmail" placeholder="email@example.com" required>
        </div>
        <div class="form-group">
          <label><span class="lang-en">Password</span><span class="lang-kz">Пароль</span></label>
          <input type="password" id="regPassword" placeholder="••••••" required minlength="6">
        </div>
        <button type="submit" class="btn btn-primary form-btn"><span class="lang-en">Register</span><span class="lang-kz">Тіркелу</span> →</button>
      </form>
      <p class="form-link"><span class="lang-en">Already have an account?</span><span class="lang-kz">Аккаунтыңыз бар ма?</span> <a href="/login"><span class="lang-en">Login</span><span class="lang-kz">Кіру</span></a></p>
    </div>
  </main>
  <div id="footer-root"></div>
  <script src="/js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('header-root').innerHTML = getHeader('');
      document.getElementById('footer-root').innerHTML = getFooter();
      initPage();
    });
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      hide('alertError'); hide('alertSuccess');
      const body = {
        name: document.getElementById('regName').value.trim(),
        phone: document.getElementById('regPhone').value.trim(),
        email: document.getElementById('regEmail').value.trim(),
        password: document.getElementById('regPassword').value
      };
      const res = await fetch('/api/register', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
      const data = await res.json();
      if (!res.ok) { show('alertError', data.error); return; }
      localStorage.setItem('jsha_user', JSON.stringify(data.user));
      show('alertSuccess', currentLang==='kz'?'Сәтті тіркелдіңіз!':'Registered successfully!');
      setTimeout(() => window.location.href = '/courses', 1200);
    });
    function show(id, msg) { const el=document.getElementById(id); el.textContent=msg; el.style.display='block'; }
    function hide(id) { document.getElementById(id).style.display='none'; }
  </script>
</body>
</html>
