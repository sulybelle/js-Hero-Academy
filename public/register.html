<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — JS Heroes Academy</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    /* ── Multi-step ── */
    .steps-indicator {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      margin-bottom: 28px;
    }
    .step-dot {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: var(--bg-primary);
      border: 2px solid var(--border-solid);
      color: var(--text-muted);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 13px;
      transition: all 0.3s;
    }
    .step-dot.active  { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }
    .step-dot.done    { border-color: var(--success); background: var(--success); color: #fff; }
    .step-line {
      flex: 1; height: 2px;
      background: var(--border-solid);
      max-width: 48px;
    }

    .form-step { display: none; }
    .form-step.active { display: block; }

    /* ── Validation ── */
    .form-group input.input-error   { border-color: var(--danger) !important; }
    .form-group input.input-success { border-color: var(--success) !important; }
    .field-error {
      display: block;
      font-size: 11px;
      color: var(--danger);
      margin-top: 4px;
      min-height: 16px;
    }
    .field-success {
      display: block;
      font-size: 11px;
      color: var(--success);
      margin-top: 4px;
    }

    /* ── Password toggle ── */
    .pass-wrap {
      position: relative;
    }
    .pass-wrap input {
      padding-right: 44px !important;
    }
    .pass-toggle {
      position: absolute;
      right: 12px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      cursor: pointer; font-size: 16px;
      color: var(--text-muted);
      padding: 0;
      line-height: 1;
    }
    .pass-toggle:hover { color: var(--accent); }

    /* ── Step nav ── */
    .step-nav {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }
    .step-nav button { flex: 1; }

    /* ── Summary ── */
    .summary-item {
      display: flex; justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid var(--border-solid);
      font-size: 14px;
    }
    .summary-item span:first-child { color: var(--text-secondary); }
    .summary-item span:last-child  { font-weight: 600; }
  </style>
</head>
<body>
<div id="header-root"></div>

<main class="form-page">
  <div class="form-container" style="max-width:480px;">
    <h2>CREATE <span>ACCOUNT</span></h2>
    <p class="form-subtitle">
      <span class="lang-en">Join the academy and start learning</span>
      <span class="lang-kz">Академияға тіркеліп, оқуды бастаңыз</span>
    </p>

    <!-- Steps indicator -->
    <div class="steps-indicator">
      <div class="step-dot active" id="dot1">1</div>
      <div class="step-line"></div>
      <div class="step-dot" id="dot2">2</div>
      <div class="step-line"></div>
      <div class="step-dot" id="dot3">3</div>
    </div>

    <div class="alert alert-error"   id="alertError"></div>
    <div class="alert alert-success" id="alertSuccess"></div>

    <!-- ── STEP 1: Жеке мәліметтер ── -->
    <div class="form-step active" id="step1">
      <h4 style="font-size:13px;color:var(--accent);letter-spacing:1px;margin-bottom:16px;">
        <span class="lang-en">STEP 1 — Personal Info</span>
        <span class="lang-kz">1-ҚАДАМ — Жеке мәліметтер</span>
      </h4>

      <div class="form-group">
        <label><span class="lang-en">Full Name</span><span class="lang-kz">Аты-жөні</span></label>
        <input type="text" id="regName" placeholder="Айбек Серікұлы">
        <span class="field-error" id="nameErr"></span>
      </div>

      <div class="form-group">
        <label><span class="lang-en">Phone</span><span class="lang-kz">Телефон</span></label>
        <input type="tel" id="regPhone" placeholder="+7 700 000 00 00">
        <span class="field-error" id="phoneErr"></span>
      </div>

      <div class="step-nav">
        <button class="btn btn-primary" onclick="goStep(2)">
          <span class="lang-en">Next</span><span class="lang-kz">Келесі</span> →
        </button>
      </div>
    </div>

    <!-- ── STEP 2: Аккаунт ── -->
    <div class="form-step" id="step2">
      <h4 style="font-size:13px;color:var(--accent);letter-spacing:1px;margin-bottom:16px;">
        <span class="lang-en">STEP 2 — Account</span>
        <span class="lang-kz">2-ҚАДАМ — Аккаунт</span>
      </h4>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="regEmail" placeholder="email@example.com">
        <span class="field-error" id="emailErr"></span>
      </div>

      <div class="form-group">
        <label><span class="lang-en">Password</span><span class="lang-kz">Пароль</span></label>
        <div class="pass-wrap">
          <input type="password" id="regPassword" placeholder="Кемінде 6 таңба">
          <button type="button" class="pass-toggle" onclick="togglePass('regPassword', this)" title="Show/Hide">👁</button>
        </div>
        <span class="field-error" id="passErr"></span>
      </div>

      <div class="form-group">
        <label><span class="lang-en">Confirm Password</span><span class="lang-kz">Парольді растаңыз</span></label>
        <div class="pass-wrap">
          <input type="password" id="regConfirm" placeholder="Парольді қайталаңыз">
          <button type="button" class="pass-toggle" onclick="togglePass('regConfirm', this)" title="Show/Hide">👁</button>
        </div>
        <span class="field-error" id="confirmErr"></span>
      </div>

      <div class="step-nav">
        <button class="btn btn-secondary" onclick="goStep(1)">
          ← <span class="lang-en">Back</span><span class="lang-kz">Артқа</span>
        </button>
        <button class="btn btn-primary" onclick="goStep(3)">
          <span class="lang-en">Next</span><span class="lang-kz">Келесі</span> →
        </button>
      </div>
    </div>

    <!-- ── STEP 3: Растау ── -->
    <div class="form-step" id="step3">
      <h4 style="font-size:13px;color:var(--accent);letter-spacing:1px;margin-bottom:16px;">
        <span class="lang-en">STEP 3 — Confirm</span>
        <span class="lang-kz">3-ҚАДАМ — Растау</span>
      </h4>

      <div id="summaryBox" style="margin-bottom:20px;"></div>

      <div class="step-nav">
        <button class="btn btn-secondary" onclick="goStep(2)">
          ← <span class="lang-en">Back</span><span class="lang-kz">Артқа</span>
        </button>
        <button class="btn btn-primary" id="submitBtn" onclick="submitRegister()">
          <span class="lang-en">Register ✦</span><span class="lang-kz">Тіркелу ✦</span>
        </button>
      </div>
    </div>

    <p class="form-link">
      <span class="lang-en">Already have an account?</span>
      <span class="lang-kz">Аккаунтыңыз бар ма?</span>
      <a href="/login"><span class="lang-en">Login</span><span class="lang-kz">Кіру</span></a>
    </p>
  </div>
</main>

<div id="footer-root"></div>
<script src="/js/main.js"></script>
<script>
  let currentStep = 1;

  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('header-root').innerHTML = getHeader('');
    document.getElementById('footer-root').innerHTML = getFooter();
    initPage();

    // Real-time validation
    document.getElementById('regName').addEventListener('input',     () => validateName(false));
    document.getElementById('regPhone').addEventListener('input',    () => validatePhone(false));
    document.getElementById('regEmail').addEventListener('input',    () => validateEmail(false));
    document.getElementById('regPassword').addEventListener('input', () => validatePass(false));
    document.getElementById('regConfirm').addEventListener('input',  () => validateConfirm(false));
  });

  // ── 13. PASSWORD SHOW/HIDE ──
  function togglePass(inputId, btn) {
    const input = document.getElementById(inputId);
    if (input.type === 'password') {
      input.type = 'text';
      btn.textContent = '🙈';
    } else {
      input.type = 'password';
      btn.textContent = '👁';
    }
  }

  // ── STEP NAV ──
  function goStep(n) {
    if (n > currentStep) {
      if (!validateStep(currentStep)) return;
    }
    showStep(n);
  }

  function showStep(n) {
    currentStep = n;
    for (let i = 1; i <= 3; i++) {
      document.getElementById('step' + i).classList.toggle('active', i === n);
      const dot = document.getElementById('dot' + i);
      dot.classList.remove('active', 'done');
      if (i < n)  dot.classList.add('done');
      if (i === n) dot.classList.add('active');
    }
    if (n === 3) buildSummary();
  }

  function buildSummary() {
    const name  = document.getElementById('regName').value.trim();
    const phone = document.getElementById('regPhone').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const kz = currentLang === 'kz';
    document.getElementById('summaryBox').innerHTML = `
      <div class="summary-item"><span>${kz?'Аты-жөні':'Full Name'}</span><span>${name}</span></div>
      <div class="summary-item"><span>${kz?'Телефон':'Phone'}</span><span>${phone}</span></div>
      <div class="summary-item"><span>Email</span><span>${email}</span></div>
      <div class="summary-item"><span>${kz?'Пароль':'Password'}</span><span>••••••</span></div>
    `;
  }

  // ── 1. FORM VALIDATION ──
  function setFieldState(inputId, errId, isValid, msg) {
    const input = document.getElementById(inputId);
    const err   = document.getElementById(errId);
    input.classList.toggle('input-error',   !isValid);
    input.classList.toggle('input-success',  isValid);
    err.textContent = isValid ? '' : msg;
    return isValid;
  }

  function validateName(strict = true) {
    const v = document.getElementById('regName').value.trim();
    const kz = currentLang === 'kz';
    if (!v)       return setFieldState('regName','nameErr', false, kz?'Атыңызды енгізіңіз':'Please enter your name');
    if (v.length < 2) return setFieldState('regName','nameErr', false, kz?'Кемінде 2 таңба':'Min 2 characters');
    return setFieldState('regName','nameErr', true, '');
  }

  function validatePhone(strict = true) {
    const v = document.getElementById('regPhone').value.trim();
    const kz = currentLang === 'kz';
    const re = /^\+?[\d\s\-()]{7,15}$/;
    if (!v)       return setFieldState('regPhone','phoneErr', false, kz?'Телефон нөмірін енгізіңіз':'Enter phone number');
    if (!re.test(v)) return setFieldState('regPhone','phoneErr', false, kz?'Нөмір дұрыс емес':'Invalid phone number');
    return setFieldState('regPhone','phoneErr', true, '');
  }

  function validateEmail(strict = true) {
    const v = document.getElementById('regEmail').value.trim();
    const kz = currentLang === 'kz';
    const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!v)       return setFieldState('regEmail','emailErr', false, kz?'Email енгізіңіз':'Enter your email');
    if (!re.test(v)) return setFieldState('regEmail','emailErr', false, kz?'Email форматы дұрыс емес':'Invalid email format');
    return setFieldState('regEmail','emailErr', true, '');
  }

  function validatePass(strict = true) {
    const v = document.getElementById('regPassword').value;
    const kz = currentLang === 'kz';
    if (!v)       return setFieldState('regPassword','passErr', false, kz?'Пароль енгізіңіз':'Enter password');
    if (v.length < 6) return setFieldState('regPassword','passErr', false, kz?'Кемінде 6 таңба':'Min 6 characters');
    return setFieldState('regPassword','passErr', true, '');
  }

  function validateConfirm(strict = true) {
    const v  = document.getElementById('regConfirm').value;
    const p  = document.getElementById('regPassword').value;
    const kz = currentLang === 'kz';
    if (!v)    return setFieldState('regConfirm','confirmErr', false, kz?'Парольді растаңыз':'Confirm your password');
    if (v !== p) return setFieldState('regConfirm','confirmErr', false, kz?'Парольдер сәйкес келмейді':'Passwords do not match');
    return setFieldState('regConfirm','confirmErr', true, '');
  }

  function validateStep(step) {
    if (step === 1) return validateName() && validatePhone();
    if (step === 2) return validateEmail() && validatePass() && validateConfirm();
    return true;
  }

  // ── SUBMIT ──
  async function submitRegister() {
    hide('alertError'); hide('alertSuccess');
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.innerHTML = '<span>⏳</span>';
    showSpinner();

    const body = {
      name:     document.getElementById('regName').value.trim(),
      phone:    document.getElementById('regPhone').value.trim(),
      email:    document.getElementById('regEmail').value.trim(),
      password: document.getElementById('regPassword').value
    };

    try {
      const res  = await fetch('/api/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      const data = await res.json();
      hideSpinner();

      if (!res.ok) {
        show('alertError', data.error);
        showToast(data.error, 'error');
        btn.disabled = false;
        btn.innerHTML = '<span class="lang-en">Register ✦</span><span class="lang-kz">Тіркелу ✦</span>';
        setLanguage(currentLang);
        return;
      }

      // 2. LOCAL STORAGE — деректерді сақтау
      localStorage.setItem('jsha_user', JSON.stringify(data.user));
      saveProgress({ registered: true, percent: 10 });

      show('alertSuccess', currentLang === 'kz' ? '✅ Сәтті тіркелдіңіз!' : '✅ Registered successfully!');
      showToast(currentLang === 'kz' ? 'Тіркелу сәтті!' : 'Registration successful!', 'success');

      setTimeout(() => window.location.href = '/courses', 1400);
    } catch {
      hideSpinner();
      show('alertError', 'Network error');
      showToast('Network error', 'error');
      btn.disabled = false;
      setLanguage(currentLang);
    }
  }

  function show(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.style.display = 'block';
  }
  function hide(id) {
    document.getElementById(id).style.display = 'none';
  }
</script>
</body>
</html>
